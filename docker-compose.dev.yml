services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    ports:
      - "1411:1411"
    environment:
      APP_URL: http://localhost:1411
      ENCRYPTION_KEY: local-dev-change-me-use-openssl-rand-base64-32
      TRUST_PROXY: "false"
    volumes:
      - ./data/pocket-id:/app/data
